<!DOCTYPE html> 
<html lang="tr"> 
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Profil</title> 
    <link rel="stylesheet" href="/pixel_store/css/style.css"> 
</head> 
<body> 
    <div id="header"></div>
    <main id="profile"> 
        <h2>Profilim</h2> 
            <section class="profile-info"> 
                <h3 class="profile-h3">Hesabım</h3> 
                <p> 
                    <span>Ad</span>
                    <span>Soyad</span>:
                    <span id="userName"></span> 
                    <input type="text" id="nameInput" class="hidden"> 
                </p> 
                <p> 
                    <span>Email</span>:  
                    <span id="userEmail"></span> 
                    <input type="email" id="emailInput" class="hidden"> 
                </p> 
                <p> 
                    <span>Adres</span>:  
                    <span id="userAddress"></span> 
                    <input type="text" id="addressInput" class="hidden"> 
                </p> 
                <p> 
                    <span>Telefon</span>:  
                    <span id="userPhone"></span> 
                    <input type="text" id="phoneInput" class="hidden"> 
                </p> 

                <button id="editBtn">Düzenle</button> 
                <button id="saveBtn" class="hidden">Kaydet</button> 
                <button id="cancelBtn" class="hidden">İptal</button> 
                <button id="logoutBtn">Çıkış Yap</button>

            </section> 

            <section class="orders"> 
                <h3 class="profile-h3">Siparişlerim</h3> 
                <div id="orders-container"></div> 
            </section>              
    </main>
    <div id="footer"></div> 

    <script type="module" src="/pixel_store/js/utils.js"></script> 
    <script type="module" src="/pixel_store/js/profile.js"></script>
</body>
</html>
